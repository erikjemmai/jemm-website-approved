<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" href="assets/favicon.png" type="image/png" />
  <title>Contact — Jemm</title>
  <meta name="description" content="Connect with the Jemm team for product inquiries, partnerships, and general questions." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>

  <header class="site-header site-header--page" id="siteHeader">
    <div class="container site-header__inner">
      <a href="index.html" class="site-logo" aria-label="Jemm home">
        <img src="assets/logo-landscape-white.png" alt="Jemm" width="75" height="18" />
      </a>
      <button class="site-nav-toggle" type="button" id="siteNavToggle" aria-expanded="false" aria-controls="siteNav" aria-label="Open menu">
        <span></span><span></span><span></span>
      </button>
      <nav class="site-nav" id="siteNav" aria-label="Main">
        <a href="index.html">Home</a>
        <a href="jemm-arc.html">Jemm Arc</a>
        <a href="about.html">About</a>
        <a href="contact.html" class="is-active" aria-current="page">Contact</a>
      </nav>
    </div>
  </header>

  <main>
    <section class="hero-page hero-page--scene hero-page--plain hero-page--contact" aria-labelledby="contact-hero-title">
      <div class="hero-page__bg" aria-hidden="true">
        <img src="assets/images/hero-contact.jpg" alt="" />
      </div>
      <div class="hero-page__content">
        <h1 class="h1" id="contact-hero-title" style="color: var(--white);">Contact us</h1>
      </div>
    </section>

    <section class="section section--black" aria-labelledby="contact-form-title">
      <div class="container">
        <div class="contact-grid">
          <div class="contact-info">
            <div class="contact-info__block">
              <h2 class="h4">General inquiries</h2>
              <p><a href="mailto:info@jemm.ai">info@jemm.ai</a></p>
            </div>
            <div class="contact-info__block">
              <h2 class="h4">Partnerships</h2>
              <p>Partnering with professionals, creators, and brands to bring seamless, local orchestration to exceptional spaces.</p>
              <p><a href="mailto:info@jemm.ai?subject=Partnership%20inquiry">Connect about a partnership</a></p>
            </div>
            <div class="contact-info__block">
              <h2 class="h4">Headquarters</h2>
              <p>800 Brickell Ave<br />Miami, Florida</p>
            </div>
          </div>

          <div class="contact-form-wrap">
            <h2 class="h3" id="contact-form-title">Send a message</h2>
            <form class="contact-form" action="mailto:info@jemm.ai" method="post" enctype="text/plain">
              <label>
                Name
                <input type="text" name="name" autocomplete="name" required />
              </label>
              <label>
                Email
                <input type="email" name="email" autocomplete="email" required />
              </label>
              <label>
                Message
                <textarea name="message" required placeholder="Tell us about your project or question…"></textarea>
              </label>
              <button type="submit" class="btn btn--primary">Send message</button>
            </form>
          </div>
        </div>
      </div>
    </section>
  </main>

  <div id="site-footer-mount"></div>

  <script src="js/footer.js"></script>
  <script src="js/site.js"></script>
</body>
</html>
